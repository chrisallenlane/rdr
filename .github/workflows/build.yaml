name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']

# Cancel an in-flight run when a newer commit lands on the same branch or
# tag. Protects against build queue buildup during a chain of quick pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Pin to the same Go patch as the Dockerfile so the toolchain that runs
    # tests is the toolchain that builds the production binary.
    container: golang:1.25.9-alpine
    steps:
      - name: Install system packages
        # alpine is minimal: bring in the tools the lint and prettier steps
        # need. bash is required for actions/checkout's bundled scripts.
        run: apk add --no-cache bash curl git nodejs npm

      - uses: actions/checkout@v4

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.11.3/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.3

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "files need formatting:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: prettier check
        run: npx prettier --check 'static/js/**/*.js'

      - name: eslint
        run: npx eslint --ignore-pattern 'static/js/htmx.min.js' static/js/

      - name: go test
        run: go test -count=1 ./...

      - name: go build
        # -buildvcs=false: git refuses to read the workspace because of a uid
        # mismatch between the host runner and the container. The production
        # binary is built inside Docker (where this isn't an issue) and stamps
        # main.version explicitly via -ldflags, so VCS info isn't needed here.
        run: go build -buildvcs=false ./cmd/rdr

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and build version
        id: meta
        # Every build gets a :sha-<short> tag (immutable, pullable per commit).
        # master additionally gets :latest. A v* tag additionally gets :<tag>
        # and uses the tag name as the VERSION build arg.
        # GHCR requires the repository path be lowercase.
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAGS="${REPO}:sha-${SHORT_SHA}"
          VERSION="${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${REPO}:${GITHUB_REF_NAME}"
            VERSION="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_REF_NAME}" = "master" ]; then
            TAGS="${TAGS},${REPO}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
