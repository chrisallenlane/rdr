{{define "title"}}Search - rdr{{end}}
{{define "content"}}
<h1>Search</h1>

<form method="get" action="/search">
    <fieldset role="group">
        <input type="search" name="q" value="{{.Content.Query}}" aria-label="Search items" placeholder="Search items..." autofocus
               hx-get="/search"
               hx-trigger="keyup changed delay:300ms, search"
               hx-target="#search-results"
               hx-swap="outerHTML"
               hx-replace-url="true">
        <button type="submit">Search</button>
    </fieldset>
</form>

{{template "search_results" .Content}}
{{end}}
