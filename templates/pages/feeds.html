{{define "title"}}Feeds - rdr{{end}}
{{define "content"}}
<h1>Feeds</h1>

<div class="feeds-actions">
    <form method="post" action="/feeds"
          hx-post="/feeds"
          hx-target="#feeds-table"
          hx-swap="outerHTML"
          data-reset-on-success>
        <fieldset role="group">
            <legend class="sr-only">Add feed</legend>
            <input type="url" name="url" aria-label="Feed URL" placeholder="https://example.com" required>
            <button type="submit"><span class="btn-text">Add Feed</span><span class="btn-spinner" aria-hidden="true">⟳</span></button>
        </fieldset>
    </form>
    <form method="post" action="/feeds/sync" class="sync-form"
          hx-post="/feeds/sync"
          hx-swap="none">
        <button type="submit" class="sync-button" aria-label="Sync all feeds"><span class="sync-icon">⟳</span> Sync Now</button>
    </form>
</div>

{{if .Content.Error}}
<p><mark>{{.Content.Error}}</mark></p>
{{end}}

<form method="post" action="/feeds/import" enctype="multipart/form-data"
      hx-post="/feeds/import"
      hx-target="#feeds-table"
      hx-swap="outerHTML"
      hx-encoding="multipart/form-data"
      data-reset-on-success>
    <fieldset role="group">
        <legend class="sr-only">Import or export OPML</legend>
        <input type="file" name="opml" aria-label="OPML file" accept=".opml,.xml" required>
        <button type="submit"><span class="btn-text">Import OPML</span><span class="btn-spinner" aria-hidden="true">⟳</span></button>
        <a href="/feeds/export" role="button">Export OPML</a>
    </fieldset>
</form>

{{template "feeds_table" .Content.Feeds}}
{{end}}
