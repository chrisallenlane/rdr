{{define "title"}}{{.Content.List.Name}} - rdr{{end}}
{{define "content"}}
<header class="list-detail-header">
    <form method="post" action="/lists/{{.Content.List.ID}}/rename" hx-post="/lists/{{.Content.List.ID}}/rename" hx-swap="none">
        <fieldset role="group">
            <input type="text" name="name" value="{{.Content.List.Name}}" aria-label="List name" required>
            <button type="submit">Rename</button>
        </fieldset>
    </form>
    <nav>
        <a href="/lists">&larr; Back to lists</a> &middot; <a href="/items?list={{.Content.List.ID}}">View items</a>
    </nav>
</header>

<section class="list-detail-section" id="feeds-in-list">
    <h2>Feeds in this list</h2>
    {{template "list_feeds_in_list" .Content}}
</section>

<section class="list-detail-section" id="feeds-available">
    <h2>Available feeds</h2>
    {{template "list_feeds_available" .Content}}
</section>
{{end}}
