{{define "title"}}{{.Content.Heading}} - rdr{{end}}
{{define "content"}}
<div class="items-layout">
    <aside>
        <div class="sidebar-header">
            <a href="/items"{{if not (or .Content.FilterFeed .Content.FilterList)}} aria-current="true"{{end}}>All Items</a>
            <form method="post" action="/feeds/sync" class="inline-form sync-form" hx-post="/feeds/sync" hx-swap="none">
                <button type="submit" class="sync-button" aria-label="Sync all feeds" title="Sync all feeds"><span class="sync-icon">⟳</span></button>
            </form>
        </div>
        <details open>
            <summary>Feeds</summary>
            <ul>
                {{range .Content.Feeds}}
                <li><a href="/items?feed={{.ID}}"{{if eq .ID $.Content.FilterFeed}} aria-current="true"{{end}}>{{feedName .}}</a></li>
                {{end}}
            </ul>
        </details>
        {{if .Content.Lists}}
        <details open>
            <summary>Lists</summary>
            <ul>
                {{range .Content.Lists}}
                <li><a href="/items?list={{.ID}}"{{if eq .ID $.Content.FilterList}} aria-current="true"{{end}}>{{.Name}}</a></li>
                {{end}}
            </ul>
        </details>
        {{end}}
    </aside>
    {{template "items_section" .Content}}
</div>
{{end}}
