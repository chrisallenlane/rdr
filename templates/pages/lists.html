{{define "title"}}Lists - rdr{{end}}
{{define "content"}}
<h1>Lists</h1>

<form method="post" action="/lists"
      hx-post="/lists"
      hx-target="#lists-table"
      hx-swap="outerHTML"
      data-reset-on-success>
    <fieldset role="group">
        <input type="text" name="name" aria-label="List name" placeholder="New list name" required>
        <button type="submit">Create List</button>
    </fieldset>
</form>

{{if .Content.Error}}
<p><mark>{{.Content.Error}}</mark></p>
{{end}}

{{template "lists_table" .Content.Lists}}
{{end}}
