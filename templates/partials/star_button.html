{{define "star_button"}}
<form method="post" action="/items/{{.ID}}/star" class="inline-form"
      hx-post="/items/{{.ID}}/star"
      hx-target="this"
      hx-swap="outerHTML">
    <button type="submit" class="link-button star-button"
            aria-label="{{if .Starred}}Unstar{{else}}Star{{end}} this item">
        {{if .Starred}}★{{else}}☆{{end}}
    </button>
</form>
{{end}}
