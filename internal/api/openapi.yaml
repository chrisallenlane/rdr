openapi: 3.0.3
info:
  title: rdr API
  version: 1.0.0
  description: |
    JSON HTTP API for [rdr](https://gitea.nas.lab.chris-allen-lane.com/chrisallenlane/rdr),
    a self-hosted RSS reader. All endpoints under `/api/v1/` (except
    `/api/v1/healthz`) require a bearer token in the `Authorization`
    header.

    Errors follow [RFC 7807 Problem Details](https://tools.ietf.org/html/rfc7807).
    Paginated lists use `Link` (RFC 5988) and `X-Total-Count` headers.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /
    description: Same-origin

tags:
  - name: identity
    description: Caller-identity endpoints.
  - name: system
    description: Liveness, spec, and other operational endpoints.

# Default security applied to every operation; individual operations
# can opt out by overriding `security: []`.
security:
  - bearerAuth: []

paths:
  /api/v1/healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      description: Returns a static OK response. Public — no authentication required.
      tags: [system]
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/v1/me:
    get:
      operationId: getMe
      summary: Identify the authenticated user
      description: |
        Returns the user identity associated with the bearer token.
        Useful for clients to confirm their token works and to discover
        their own user id.
      tags: [identity]
      responses:
        "200":
          description: The authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: rdr_pat
      description: |
        Bearer token (rdr Personal Access Token, format
        `rdr_pat_<64 hex chars>`) issued via the Settings page.

  schemas:
    HealthStatus:
      type: object
      required: [status]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
          description: Always "ok". Reserved for future expansion.

    User:
      type: object
      required: [id, username, created_at]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          description: Database id of the user.
        username:
          type: string
          description: Login name (unique).
        created_at:
          type: string
          format: date-time
          description: When the user account was created.

    Problem:
      description: |
        RFC 7807 Problem Details. Returned for any 4xx or 5xx response.
      type: object
      required: [type, title, status]
      additionalProperties: false
      properties:
        type:
          type: string
          format: uri
          description: |
            URI identifying the problem type. `about:blank` is used for
            problems that don't have a dedicated type URI.
          example: about:blank
        title:
          type: string
          description: Short, human-readable summary of the problem.
          example: Bad Request
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: URI reference identifying the specific occurrence.

  responses:
    BadRequest:
      description: The request is malformed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: |
        The Authorization header is missing, malformed, references an
        unknown token, or the token has expired. The same status is
        returned for every failure mode so unauthenticated callers
        cannot enumerate valid token identifiers.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: An unexpected error occurred.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
