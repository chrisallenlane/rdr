name: Build and push Docker image

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: linux-amd64
    container: catthehacker/ubuntu:act-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Gitea registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login gitea.nas.lab.chris-allen-lane.com -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and push
        run: |
          docker build \
            --build-arg VERSION=${{ github.sha }} \
            -t gitea.nas.lab.chris-allen-lane.com/chrisallenlane/rdr:latest \
            .
          docker push gitea.nas.lab.chris-allen-lane.com/chrisallenlane/rdr:latest
